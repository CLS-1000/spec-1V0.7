<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPEC-1 · Verdict Filing</title>
  <style>
    /* ── Sacred Geometry palette: black / white / monospace only ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #2a2a2a;
      --muted:    #444444;
      --text:     #e8e8e8;
      --dim:      #888888;
      --accent:   #ffffff;
      --error:    #ff4444;
      --success:  #44ff88;
      --font:     "IBM Plex Mono", "Courier New", monospace;
      --radius:   2px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--dim); text-decoration: none; }
    a:hover { color: var(--accent); }

    /* ── Layout ──────────────────────────────────────────────────── */
    .layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 2rem;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    header p {
      color: var(--dim);
      margin-top: 0.3rem;
      font-size: 0.8rem;
    }

    /* ── Two-column grid ─────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    /* ── Panel ───────────────────────────────────────────────────── */
    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .panel-body { padding: 1rem; }

    /* ── Record list ─────────────────────────────────────────────── */
    #record-list {
      list-style: none;
      max-height: 420px;
      overflow-y: auto;
    }
    #record-list li {
      padding: 0.55rem 0.5rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    #record-list li:last-child { border-bottom: none; }
    #record-list li:hover,
    #record-list li.selected { background: #1a1a1a; }
    #record-list li.selected { border-left: 2px solid var(--accent); padding-left: calc(0.5rem - 2px); }
    .rec-id   { font-size: 0.7rem; color: var(--dim); font-family: var(--font); }
    .rec-cls  { font-size: 0.75rem; color: var(--text); margin-top: 0.15rem; }
    .rec-conf { font-size: 0.65rem; color: var(--muted); }
    #record-empty { color: var(--dim); font-size: 0.8rem; padding: 1rem 0; }

    /* ── Filter ──────────────────────────────────────────────────── */
    #filter-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      padding: 0.4rem 0.6rem;
      margin-bottom: 0.75rem;
      outline: none;
    }
    #filter-input:focus { border-color: var(--muted); }

    /* ── Form ────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 0.35rem;
    }
    input[type="text"], textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      padding: 0.45rem 0.6rem;
      outline: none;
      resize: vertical;
    }
    input[type="text"]:focus,
    textarea:focus,
    select:focus { border-color: var(--muted); }
    textarea { min-height: 70px; }

    /* verdict radio buttons */
    .verdict-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
      margin-top: 0.25rem;
    }
    .verdict-opt {
      position: relative;
    }
    .verdict-opt input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .verdict-opt label {
      display: block;
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      transition: background 0.1s, border-color 0.1s;
      color: var(--dim);
    }
    .verdict-opt input[type="radio"]:checked + label {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent);
    }
    .verdict-opt label:hover { border-color: var(--muted); color: var(--text); }

    /* ── Submit button ───────────────────────────────────────────── */
    #submit-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: var(--font);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.6rem;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s, color 0.15s;
    }
    #submit-btn:hover { background: var(--accent); color: var(--bg); }
    #submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Status messages ─────────────────────────────────────────── */
    #status-msg {
      font-size: 0.78rem;
      padding: 0.5rem 0;
      min-height: 1.4rem;
    }
    #status-msg.success { color: var(--success); }
    #status-msg.error   { color: var(--error); }

    /* ── Count badge ─────────────────────────────────────────────── */
    #verdict-count {
      font-size: 0.7rem;
      color: var(--dim);
      margin-top: 0.5rem;
    }

    /* ── Scrollbar (webkit) ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <h1>SPEC-1 &mdash; Verdict Filing</h1>
      <p>Select an intelligence record, choose a verdict, and submit your assessment.</p>
    </header>

    <div class="grid">
      <!-- ── Left: record browser ─────────────────────────────── -->
      <section class="panel" aria-label="Intelligence records">
        <div class="panel-header">Recent records &mdash; last 50</div>
        <div class="panel-body">
          <input
            type="text"
            id="filter-input"
            placeholder="Filter by record ID or classification…"
            autocomplete="off"
          />
          <ul id="record-list" role="list" aria-label="Intelligence records" aria-live="polite">
            <li id="record-empty">Loading records…</li>
          </ul>
        </div>
      </section>

      <!-- ── Right: verdict form ───────────────────────────────── -->
      <section class="panel" aria-label="File a verdict">
        <div class="panel-header">File verdict</div>
        <div class="panel-body">
          <form id="verdict-form" novalidate>
            <div class="form-group">
              <label for="record-id-input">Record ID <span style="color:var(--error)">*</span></label>
              <input
                type="text"
                id="record-id-input"
                name="record_id"
                placeholder="Select a record on the left or type an ID"
                required
              />
            </div>

            <div class="form-group">
              <label>Verdict <span style="color:var(--error)">*</span></label>
              <div class="verdict-grid">
                <div class="verdict-opt">
                  <input type="radio" name="verdict" id="v-correct" value="correct" />
                  <label for="v-correct">Correct</label>
                </div>
                <div class="verdict-opt">
                  <input type="radio" name="verdict" id="v-incorrect" value="incorrect" />
                  <label for="v-incorrect">Incorrect</label>
                </div>
                <div class="verdict-opt">
                  <input type="radio" name="verdict" id="v-partial" value="partial" />
                  <label for="v-partial">Partial</label>
                </div>
                <div class="verdict-opt">
                  <input type="radio" name="verdict" id="v-unclear" value="unclear" />
                  <label for="v-unclear">Unclear</label>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label for="reviewer-input">Reviewer</label>
              <input
                type="text"
                id="reviewer-input"
                name="reviewer"
                placeholder="anonymous"
                autocomplete="username"
              />
            </div>

            <div class="form-group">
              <label for="notes-input">Notes (optional)</label>
              <textarea
                id="notes-input"
                name="notes"
                placeholder="Supporting reasoning, sources, or caveats…"
              ></textarea>
            </div>

            <div id="status-msg" role="status" aria-live="polite"></div>

            <button type="submit" id="submit-btn">Submit verdict</button>
          </form>

          <div id="verdict-count"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    /* ── Config ─────────────────────────────────────────────────── */
    const API_INTEL    = "/api/v1/intel";
    const API_VERDICTS = "/api/v1/verdicts";
    const LIMIT        = 50;

    /* ── DOM refs ───────────────────────────────────────────────── */
    const recordList   = document.getElementById("record-list");
    const filterInput  = document.getElementById("filter-input");
    const recordInput  = document.getElementById("record-id-input");
    const reviewerInput= document.getElementById("reviewer-input");
    const notesInput   = document.getElementById("notes-input");
    const statusMsg    = document.getElementById("status-msg");
    const submitBtn    = document.getElementById("submit-btn");
    const countEl      = document.getElementById("verdict-count");
    const form         = document.getElementById("verdict-form");

    let allRecords  = [];
    let totalVerdicts = 0;

    /* ── Fetch intelligence records ─────────────────────────────── */
    async function loadRecords() {
      try {
        const res  = await fetch(`${API_INTEL}?limit=${LIMIT}&offset=0`);
        const data = await res.json();
        allRecords = (data.items || []).reverse(); // newest first
        renderRecords(allRecords);
      } catch (err) {
        recordList.innerHTML =
          '<li id="record-empty" style="color:var(--error)">Failed to load records.</li>';
      }
    }

    /* ── Fetch verdict count ────────────────────────────────────── */
    async function loadVerdictCount() {
      try {
        const res  = await fetch(`${API_VERDICTS}?limit=1&offset=0`);
        const data = await res.json();
        totalVerdicts = data.total || 0;
        renderCount();
      } catch (_) { /* non-fatal */ }
    }

    function renderCount() {
      countEl.textContent = `Total verdicts filed: ${totalVerdicts}`;
    }

    /* ── Render filtered list ───────────────────────────────────── */
    function renderRecords(records) {
      if (!records.length) {
        recordList.innerHTML = '<li id="record-empty">No records found.</li>';
        return;
      }
      const currentId = recordInput.value.trim();
      recordList.innerHTML = records.map(r => {
        const id  = r.record_id || r.signal_id || "";
        const cls = r.classification || "—";
        const conf = r.confidence != null ? (r.confidence * 100).toFixed(0) + "%" : "";
        const sel = id === currentId ? " selected" : "";
        return `<li role="listitem" class="rec-item${sel}" data-id="${escHtml(id)}" tabindex="0"
                    aria-label="${escHtml(cls)} — ${escHtml(id)}${sel ? ' (selected)' : ''}">
          <div class="rec-id">${escHtml(id)}</div>
          <div class="rec-cls">${escHtml(cls)}</div>
          ${conf ? `<div class="rec-conf">confidence: ${conf}</div>` : ""}
        </li>`;
      }).join("");

      // Attach click handlers
      recordList.querySelectorAll(".rec-item").forEach(li => {
        li.addEventListener("click", () => selectRecord(li));
        li.addEventListener("keydown", e => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); selectRecord(li); }
        });
      });
    }

    function selectRecord(li) {
      recordList.querySelectorAll(".rec-item").forEach(el => el.classList.remove("selected"));
      li.classList.add("selected");
      recordInput.value = li.dataset.id;
      clearStatus();
    }

    /* ── Filter records on input ────────────────────────────────── */
    filterInput.addEventListener("input", () => {
      const q = filterInput.value.toLowerCase();
      const filtered = allRecords.filter(r => {
        const id  = (r.record_id || r.signal_id || "").toLowerCase();
        const cls = (r.classification || "").toLowerCase();
        return id.includes(q) || cls.includes(q);
      });
      renderRecords(filtered);
    });

    /* ── Form submit ────────────────────────────────────────────── */
    form.addEventListener("submit", async e => {
      e.preventDefault();
      const recordId = recordInput.value.trim();
      const verdict  = (form.querySelector('input[name="verdict"]:checked') || {}).value;
      const reviewer = reviewerInput.value.trim() || "anonymous";
      const notes    = notesInput.value.trim();

      if (!recordId) { showStatus("Record ID is required.", "error"); return; }
      if (!verdict)  { showStatus("Please select a verdict.", "error"); return; }

      submitBtn.disabled = true;
      clearStatus();

      try {
        const res = await fetch(API_VERDICTS, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ record_id: recordId, verdict, reviewer, notes }),
        });

        if (res.ok) {
          const data = await res.json();
          totalVerdicts += 1;
          renderCount();
          showStatus(`✓ Verdict recorded (${verdict}) for ${recordId}.`, "success");
          form.querySelector('input[name="verdict"]:checked').checked = false;
          notesInput.value = "";
          clearStatus(4000);
        } else {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          showStatus(`Error ${res.status}: ${err.detail || "Unknown error"}`, "error");
        }
      } catch (err) {
        showStatus(`Network error: ${err.message}`, "error");
      } finally {
        submitBtn.disabled = false;
      }
    });

    /* ── Helpers ─────────────────────────────────────────────────── */
    function showStatus(msg, kind, timeout) {
      statusMsg.textContent = msg;
      statusMsg.className   = kind || "";
      if (timeout) setTimeout(clearStatus, timeout);
    }
    function clearStatus(delay) {
      if (delay) { setTimeout(() => { statusMsg.textContent = ""; statusMsg.className = ""; }, delay); }
      else { statusMsg.textContent = ""; statusMsg.className = ""; }
    }
    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    /* ── Init ────────────────────────────────────────────────────── */
    loadRecords();
    loadVerdictCount();
  </script>
</body>
</html>
