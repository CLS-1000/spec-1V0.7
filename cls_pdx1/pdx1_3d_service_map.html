<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDX-1i • 3D Space Service Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  body { margin:0; background:#000; overflow:hidden; font-family: 'IBM Plex Mono', monospace; color:#0f0; }
  #info {
    position:absolute; top:20px; left:20px; z-index:100;
    background:rgba(0,0,0,0.7); padding:12px 16px; border:1px solid #0f0;
    font-size:12px;
  }
  canvas { display:block; }
</style>
</head>
<body>

<div id="info">
  PDX-1i 3D Service Map<br>
  <span style="color:#666; font-size:10px;">Drag to rotate • Scroll to zoom • Click nodes</span>
</div>

<script>
// Three.js 3D Space Map
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Stars
for (let i = 0; i < 800; i++) {
  const star = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 4, 4),
    new THREE.MeshBasicMaterial({ color: 0x444444 })
  );
  star.position.set(
    (Math.random() - 0.5) * 400,
    (Math.random() - 0.5) * 400,
    (Math.random() - 0.5) * 400
  );
  scene.add(star);
}

// Nodes Data
const nodeData = [
  { id: 'wheeler', name: 'Ted Wheeler', type: 'official', color: 0x22c55e },
  { id: 'rubio', name: 'Carmen Rubio', type: 'official', color: 0x22c55e },
  { id: 'wyden', name: 'Ron Wyden', type: 'official', color: 0x22c55e },
  { id: 'nike', name: 'Nike', type: 'entity', color: 0xeab308 },
  { id: 'intel', name: 'Intel', type: 'entity', color: 0xeab308 },
  { id: 'schnitzer', name: 'Schnitzer Steel', type: 'entity', color: 0xeab308 },
  { id: 'ohsu', name: 'OHSU', type: 'entity', color: 0xeab308 },
  { id: 'pge', name: 'PGE', type: 'entity', color: 0xeab308 }
];

const nodes = [];
const nodeObjects = {};

nodeData.forEach((data, i) => {
  const geometry = new THREE.SphereGeometry(4, 32, 32);
  const material = new THREE.MeshPhongMaterial({ 
    color: data.color, 
    emissive: data.color, 
    shininess: 80 
  });
  const sphere = new THREE.Mesh(geometry, material);
  
  // Random floating position
  sphere.position.x = (Math.random() - 0.5) * 120;
  sphere.position.y = (Math.random() - 0.5) * 80;
  sphere.position.z = (Math.random() - 0.5) * 80;
  
  sphere.userData = data;
  scene.add(sphere);
  nodes.push(sphere);
  nodeObjects[data.id] = sphere;
});

// Connection Lines
const connections = [
  ['wheeler', 'nike'], ['wheeler', 'pge'],
  ['rubio', 'ohsu'], ['wyden', 'intel'],
  ['nike', 'intel'], ['schnitzer', 'pge']
];

connections.forEach(([from, to]) => {
  const fromNode = nodeObjects[from];
  const toNode = nodeObjects[to];
  if (!fromNode || !toNode) return;

  const points = [fromNode.position, toNode.position];
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.6 });
  const line = new THREE.Line(geometry, material);
  scene.add(line);
});

// Lighting
const light = new THREE.PointLight(0xffffff, 1, 300);
light.position.set(50, 50, 50);
scene.add(light);

const ambient = new THREE.AmbientLight(0x222222);
scene.add(ambient);

camera.position.z = 140;

// Mouse Controls
let isDragging = false;
let previousMouseX = 0;
let previousMouseY = 0;

window.addEventListener('mousedown', (e) => {
  isDragging = true;
  previousMouseX = e.clientX;
  previousMouseY = e.clientY;
});

window.addEventListener('mouseup', () => isDragging = false);

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  
  const deltaX = e.clientX - previousMouseX;
  const deltaY = e.clientY - previousMouseY;
  
  nodes.forEach(node => {
    node.rotation.y += deltaX * 0.002;
    node.rotation.x += deltaY * 0.002;
  });
  
  previousMouseX = e.clientX;
  previousMouseY = e.clientY;
});

// Zoom
window.addEventListener('wheel', (e) => {
  camera.position.z += e.deltaY * 0.3;
  camera.position.z = Math.max(40, Math.min(300, camera.position.z));
});

// Click detection
window.addEventListener('click', (e) => {
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodes);
  
  if (intersects.length > 0) {
    const node = intersects[0].object;
    const data = node.userData;
    alert(`${data.name}\nType: ${data.type}\n\nStatus: ${data.color === 0x22c55e ? 'REAL' : 'DEMO'}\n\nTies: NOT VERIFIED - Research required`);
  }
});

// Animation
function animate() {
  requestAnimationFrame(animate);
  
  // Gentle floating animation
  nodes.forEach((node, i) => {
    node.position.y += Math.sin(Date.now() / 1000 + i) * 0.008;
    node.rotation.y += 0.001;
  });
  
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

console.log('%c[PDX-1i] 3D Space Service Map loaded', 'color:#0f0');
</script>

</body>
</html>
