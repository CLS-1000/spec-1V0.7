<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDX-1i • Service Map</title>
<style>
  body {
    margin: 0;
    background: #000;
    color: #0f0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  .container {
    padding: 40px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .header {
    border-bottom: 1px solid #0f0;
    padding-bottom: 12px;
    margin-bottom: 30px;
  }
  .title {
    font-size: 24px;
    margin: 0;
  }
  .subtitle {
    color: #555;
    margin-top: 6px;
  }
  .map {
    position: relative;
    width: 100%;
    height: 700px;
    border: 1px solid #0f0;
    background: #0a0a0a;
  }
  .node {
    position: absolute;
    background: #111;
    border: 1px solid #0f0;
    padding: 12px 16px;
    min-width: 140px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .node:hover {
    background: #1a1a1a;
    border-color: #0f0;
    box-shadow: 0 0 15px #0f0;
  }
  .node.official {
    border-color: #22c55e;
    color: #22c55e;
  }
  .node.entity {
    border-color: #eab308;
    color: #eab308;
  }
  .node-label {
    font-weight: bold;
    margin-bottom: 4px;
  }
  .node-type {
    font-size: 10px;
    color: #666;
  }
  .connection {
    position: absolute;
    border-top: 1px dashed #333;
    z-index: 1;
  }
  .legend {
    margin-top: 20px;
    font-size: 11px;
    color: #555;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 class="title">PDX-1i SERVICE MAP</h1>
    <div class="subtitle">Portland Metro Political & Corporate Network • May 2026</div>
  </div>

  <div class="map" id="map">
    <!-- Nodes will be added by JS -->
  </div>

  <div class="legend">
    <span style="color:#22c55e">■</span> Official &nbsp;&nbsp;
    <span style="color:#eab308">■</span> Entity &nbsp;&nbsp;
    Dashed lines = Connection (NOT VERIFIED - Research required)
  </div>
</div>

<script>
const nodes = [
  { id: 'wheeler', name: 'Ted Wheeler', type: 'official', x: 180, y: 120, note: 'Former Mayor' },
  { id: 'rubio', name: 'Carmen Rubio', type: 'official', x: 420, y: 90, note: 'City Commissioner' },
  { id: 'wyden', name: 'Ron Wyden', type: 'official', x: 720, y: 180, note: 'U.S. Senator' },
  { id: 'nike', name: 'Nike, Inc.', type: 'entity', x: 280, y: 320, note: 'Beaverton HQ' },
  { id: 'intel', name: 'Intel Corp', type: 'entity', x: 520, y: 380, note: 'Hillsboro Campus' },
  { id: 'schnitzer', name: 'Schnitzer Steel', type: 'entity', x: 160, y: 420, note: 'Portland' },
  { id: 'ohsu', name: 'OHSU', type: 'entity', x: 620, y: 280, note: 'Portland' },
  { id: 'pge', name: 'Portland General Electric', type: 'entity', x: 400, y: 480, note: 'Utility' },
  { id: 'trimet', name: 'TriMet', type: 'entity', x: 300, y: 520, note: 'Transit' }
];

const connections = [
  ['wheeler', 'nike'], ['wheeler', 'pge'],
  ['rubio', 'ohsu'], ['wyden', 'intel'],
  ['nike', 'intel'], ['schnitzer', 'pge'],
  ['trimet', 'pge']
];

const map = document.getElementById('map');

// Create nodes
nodes.forEach(node => {
  const el = document.createElement('div');
  el.className = `node ${node.type}`;
  el.style.left = `${node.x}px`;
  el.style.top = `${node.y}px`;
  el.innerHTML = `
    <div class="node-label">${node.name}</div>
    <div class="node-type">${node.type.toUpperCase()}</div>
  `;
  
  el.onclick = () => {
    alert(`${node.name}\n${node.note}\n\nStatus: ${node.type === 'official' ? 'REAL' : 'DEMO'}\n\nCorporate/Political Ties: NOT VERIFIED\nPlease research independently.`);
  };
  
  map.appendChild(el);
});

// Create connection lines
connections.forEach(([fromId, toId]) => {
  const from = nodes.find(n => n.id === fromId);
  const to = nodes.find(n => n.id === toId);
  if (!from || !to) return;

  const line = document.createElement('div');
  line.className = 'connection';
  
  const x1 = from.x + 70;
  const y1 = from.y + 30;
  const x2 = to.x + 70;
  const y2 = to.y + 30;
  
  const length = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
  const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
  
  line.style.left = `${x1}px`;
  line.style.top = `${y1}px`;
  line.style.width = `${length}px`;
  line.style.transform = `rotate(${angle}deg)`;
  line.style.transformOrigin = '0 0';
  
  map.appendChild(line);
});

console.log('%c[PDX-1i] Terminal Service Map loaded - Branding matched', 'color:#0f0');
</script>

</body>
</html>
