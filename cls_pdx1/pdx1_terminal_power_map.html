<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDX-1i • Terminal Power Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');
  body { margin:0; background:#000; color:#0f0; font-family:'IBM Plex Mono', monospace; }
  .container { padding:30px; max-width:1600px; margin:0 auto; }
  .header { border-bottom:1px solid #0f0; padding-bottom:15px; margin-bottom:25px; }
  .title { font-size:22px; margin:0; }
  .map { 
    position:relative; 
    width:100%; 
    height:820px; 
    border:1px solid #0f0; 
    background:#0a0a0a; 
    overflow:hidden;
  }
  .node {
    position:absolute;
    background:#111;
    border:1px solid #0f0;
    padding:10px 14px;
    min-width:160px;
    text-align:center;
    cursor:pointer;
    font-size:12px;
    transition:all 0.15s;
  }
  .node:hover { background:#1a1a1a; box-shadow:0 0 12px #0f0; }
  .node.official { border-color:#22c55e; color:#22c55e; }
  .node.entity { border-color:#eab308; color:#eab308; }
  .node.district { border-color:#60a5fa; color:#60a5fa; }
  .node-label { font-weight:600; margin-bottom:3px; }
  .node-type { font-size:9px; color:#555; }
  .connection {
    position:absolute;
    height:1px;
    background:#333;
    z-index:1;
  }
  .legend { margin-top:20px; font-size:11px; color:#555; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 class="title">PDX-1i POWER MAP</h1>
    <div style="color:#555; margin-top:6px;">Portland Metro • Terminal View • May 2026</div>
  </div>

  <div class="map" id="map"></div>

  <div class="legend">
    <span style="color:#22c55e">■</span> Officials &nbsp;
    <span style="color:#eab308">■</span> Entities &nbsp;
    <span style="color:#60a5fa">■</span> Districts &nbsp;
    Dashed lines = Connections (NOT VERIFIED)
  </div>
</div>

<script>
// Full data from seeds
  const nodes = [
    // Officials
    {id:"off:keith-wilson", label:"Keith Wilson", type:"official", x:220, y:140},
    {id:"off:jamie-dunphy", label:"Jamie Dunphy", type:"official", x:380, y:110},
    {id:"off:jessica-vega", label:"Jessica Vega Pederson", type:"official", x:580, y:180},
    {id:"off:duncan-hwang", label:"Duncan Hwang", type:"official", x:780, y:130},
    {id:"off:ron-wyden", label:"Ron Wyden", type:"official", x:950, y:220},
    
    // Entities (watch-listed = larger)
    {id:"ent:pge", label:"Portland General Electric", type:"entity", x:300, y:380},
    {id:"ent:nw-natural", label:"NW Natural", type:"entity", x:480, y:420},
    {id:"ent:ppb", label:"Portland Police Bureau", type:"entity", x:650, y:350},
    {id:"ent:schnitzer", label:"Schnitzer Cluster", type:"entity", x:200, y:480},
    {id:"ent:ohsu", label:"OHSU", type:"entity", x:720, y:480},
    {id:"ent:trimet", label:"TriMet", type:"entity", x:420, y:520},
    
    // Districts
    {id:"dist:portland-citywide", label:"Portland Citywide", type:"district", x:350, y:220},
    {id:"dist:multnomah", label:"Multnomah County", type:"district", x:580, y:280},
  ];

  const connections = [
    ["off:keith-wilson", "ent:pge"],
    ["off:keith-wilson", "ent:nw-natural"],
    ["off:keith-wilson", "ent:schnitzer"],
    ["off:jamie-dunphy", "ent:schnitzer"],
    ["off:jessica-vega", "ent:ohsu"],
    ["ent:pge", "ent:ppb"],
    ["ent:nw-natural", "ent:trimet"],
    ["off:keith-wilson", "dist:portland-citywide"],
    ["off:jessica-vega", "dist:multnomah"],
  ];

  const map = document.getElementById('map');

  // Create nodes
  nodes.forEach(node => {
    const el = document.createElement('div');
    el.className = `node ${node.type}`;
    el.style.left = `${node.x}px`;
    el.style.top = `${node.y}px`;
    el.innerHTML = `
      <div class="node-label">${node.label}</div>
      <div class="node-type">${node.type.toUpperCase()}</div>
    `;
    el.onclick = () => alert(`${node.label}\nType: ${node.type}\n\nTies: NOT VERIFIED\nResearch required.`);
    map.appendChild(el);
  });

  // Create connections
  connections.forEach(([fromId, toId]) => {
    const from = nodes.find(n => n.id === fromId);
    const to = nodes.find(n => n.id === toId);
    if (!from || !to) return;

    const line = document.createElement('div');
    line.className = 'connection';
    
    const x1 = from.x + 80;
    const y1 = from.y + 25;
    const x2 = to.x + 80;
    const y2 = to.y + 25;
    
    const length = Math.sqrt(Math.pow(x2-x1,2) + Math.pow(y2-y1,2));
    const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
    
    line.style.left = `${x1}px`;
    line.style.top = `${y1}px`;
    line.style.width = `${length}px`;
    line.style.transform = `rotate(${angle}deg)`;
    line.style.transformOrigin = '0 0';
    
    map.appendChild(line);
  });

  console.log('%c[PDX-1i] Terminal Power Map loaded', 'color:#0f0');
</script>

</body>
</html>
