<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDX-1i • Service Map (Grafana Style)</title>
<style>
  body { margin:0; background:#0f1115; color:#e0e0e0; font-family: 'IBM Plex Mono', monospace; }
  #container { width:100%; height:100vh; position:relative; background:#0f1115; }
  svg { width:100%; height:100%; }
  .node { cursor:pointer; }
  .node circle { stroke:#d4af37; stroke-width:2.5; }
  .node.real circle { stroke:#22c55e; }
  .node.demo circle { stroke:#eab308; }
  .node text { fill:#e0e0e0; font-size:11px; text-anchor:middle; dominant-baseline:middle; }
  .link { stroke:#3a3f4a; stroke-width:1.5; }
  .legend { position:absolute; bottom:20px; left:20px; background:#1a1d24; padding:14px 18px; border:1px solid #333; font-size:12px; }
</style>
</head>
<body>

<div id="container">
  <svg id="graph"></svg>
</div>

<div class="legend">
  <div><span style="color:#22c55e">●</span> Real Data</div>
  <div><span style="color:#eab308">●</span> Demo / Placeholder</div>
  <div style="margin-top:6px; color:#666; font-size:10px;">Click nodes for details</div>
</div>

<script>
const width = window.innerWidth;
const height = window.innerHeight;

const nodes = [
  { id: "wheeler", name: "Ted Wheeler", x: 280, y: 220, status: "real" },
  { id: "rubio", name: "Carmen Rubio", x: 420, y: 180, status: "real" },
  { id: "wyden", name: "Ron Wyden", x: 680, y: 260, status: "real" },
  { id: "nike", name: "Nike", x: 350, y: 380, status: "real" },
  { id: "intel", name: "Intel", x: 520, y: 420, status: "real" },
  { id: "schnitzer", name: "Schnitzer Steel", x: 220, y: 460, status: "real" },
  { id: "ohsu", name: "OHSU", x: 600, y: 340, status: "real" },
  { id: "pge", name: "PGE", x: 460, y: 520, status: "real" },
  { id: "trimet", name: "TriMet", x: 320, y: 540, status: "real" }
];

const links = [
  { source: "wheeler", target: "nike" },
  { source: "wheeler", target: "pge" },
  { source: "rubio", target: "ohsu" },
  { source: "wyden", target: "intel" },
  { source: "nike", target: "intel" },
  { source: "schnitzer", target: "pge" },
  { source: "trimet", target: "pge" }
];

const svg = document.getElementById('graph');

// Draw links
links.forEach(link => {
  const from = nodes.find(n => n.id === link.source);
  const to = nodes.find(n => n.id === link.target);
  if (!from || !to) return;

  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', from.x);
  line.setAttribute('y1', from.y);
  line.setAttribute('x2', to.x);
  line.setAttribute('y2', to.y);
  line.setAttribute('class', 'link');
  svg.appendChild(line);
});

// Draw nodes
nodes.forEach(node => {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', `node ${node.status}`);

  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', node.x);
  circle.setAttribute('cy', node.y);
  circle.setAttribute('r', 32);
  circle.setAttribute('fill', '#1a1d24');

  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', node.x);
  text.setAttribute('y', node.y);
  text.textContent = node.name;

  g.appendChild(circle);
  g.appendChild(text);

  g.onclick = () => {
    alert(`${node.name}\nStatus: ${node.status.toUpperCase()}\n\nTies & Connections: NOT VERIFIED — Research required`);
  };

  svg.appendChild(g);
});

console.log('%c[PDX-1i] Grafana-style Service Map loaded', 'color:#d4af37');
</script>

</body>
</html>
