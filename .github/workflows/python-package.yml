name: Python package

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OLLAMA_AUTO_SPAWN: "false"


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install -e ".[dev]"
        pip install ruff bandit[toml] coverage pytest-cov

    - name: Check hardcoded labels
      run: python .github/scripts/check_hardcoded_labels.py

    - name: Lint with ruff
      run: ruff check src/ tests/

    - name: Security check with bandit
      run: |
        bandit -r src/ --severity-level medium --exit-zero -f json -o bandit-report.json
        python -c "
        import json, sys
        try:
            d = json.load(open('bandit-report.json'))
            high_count = d['metrics']['_totals'].get('SEVERITY.HIGH', 0)
            medium_count = d['metrics']['_totals'].get('SEVERITY.MEDIUM', 0)
            if high_count > 0:
                print(f'❌ bandit: {high_count} HIGH severity issue(s) found')
                sys.exit(1)
            elif medium_count > 0:
                print(f'⚠️  bandit: {medium_count} MEDIUM severity issue(s) found (allowed, but review recommended)')
            else:
                print('✓ bandit: no HIGH or MEDIUM severity issues')
        except Exception as e:
            print(f'Error parsing bandit report: {e}')
            sys.exit(1)
        "

    - name: Test with pytest + coverage
      env:
        PYTHONPATH: src
      run: |
        pytest --cov=src --cov-report=xml --cov-report=term-missing -q

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
      continue-on-error: true
