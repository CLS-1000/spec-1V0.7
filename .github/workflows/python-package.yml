name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        python -m pip install "setuptools>=65,<70"
        pip install sgmllib3k --no-build-isolation
        pip install -e ".[dev]"
        pip install ruff bandit[toml] coverage pytest-cov

    - name: Check hardcoded labels
      run: python .github/scripts/check_hardcoded_labels.py

    - name: Lint with ruff
      run: ruff check src/ tests/ --show-source

    - name: Security check with bandit
      run: |
        bandit -r src/ --severity-level medium -f json -o bandit-report.json || true
        python -c "
        import json, sys
        d = json.load(open('bandit-report.json'))
        n = d['metrics']['_totals'].get('SEVERITY.HIGH', 0)
        if n > 0:
            print(f'bandit: {n} HIGH severity issues found')
            sys.exit(1)
        print('bandit: no HIGH severity issues')
        "

    - name: Test with pytest + coverage
      env:
        PYTHONPATH: src
      run: |
        pytest --cov=src --cov-report=xml --cov-report=term-missing -q

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
      continue-on-error: true
